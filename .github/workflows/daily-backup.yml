# Daily Backup: scheduled and manual runs use the workflow from the branch they run on.
# For schedule (03:00 UTC) and default manual run, that is usually "main". Merge workflow changes to main for them to take effect.
name: Daily Backup

on:
  schedule:
    - cron: '0 3 * * *'   # Runs daily at 03:00 UTC
  workflow_dispatch:       # Allows manual run

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install MongoDB Database Tools
        run: |
          # Install mongodump via tarball (avoids apt repo / package name issues on ubuntu-latest)
          TOOLS_VER=100.14.1
          curl -sSLO "https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-${TOOLS_VER}.tgz"
          tar -zxf "mongodb-database-tools-ubuntu2204-x86_64-${TOOLS_VER}.tgz"
          sudo cp "mongodb-database-tools-ubuntu2204-x86_64-${TOOLS_VER}/bin/mongodump" /usr/local/bin/
          sudo chmod +x /usr/local/bin/mongodump
          mongodump --version

      - name: Run Mongo Backup
        run: npx tsx scripts/backupMongoAtlas.ts
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}

      - name: Run Blob Backup
        run: npx tsx scripts/backupVercelBlob.ts
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Upload Backup Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-backup-${{ github.run_number }}
          path: |
            *.archive.gz
            *.tar.gz
          retention-days: 30